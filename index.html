<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo OS | V7 Ultimate</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050a18;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e6ed;
        }

        * { box-sizing: border-box; outline: none; transition: 0.2s; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text);
            background-image: radial-gradient(circle at 50% 0%, #1a2a4a 0%, #050a18 70%);
            height: 100vh; overflow: hidden;
        }

        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; }
        .hidden { display: none !important; }

        /* Estrutura */
        .main-app { display: grid; grid-template-columns: 80px 1fr 320px; height: calc(100vh - 40px); margin-top: 40px; padding: 20px; gap: 20px; }
        
        /* Top Bar OS */
        .top-bar { position: fixed; top: 0; width: 100%; height: 35px; background: rgba(0,0,0,0.5); display: flex; align-items: center; padding: 0 20px; font-size: 12px; z-index: 10000; justify-content: space-between; border-bottom: 1px solid var(--border); }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        .nav-item {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 15px; font-size: 18px; opacity: 0.4;
        }
        .nav-item.active { opacity: 1; background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .content-scroll { overflow-y: auto; padding-right: 10px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        
        /* Posts e Galeria */
        .post { padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 15px; max-height: 350px; object-fit: cover; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .gallery-item { width: 100%; aspect-ratio: 1; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }

        /* Notificações Toaster */
        #toaster { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; background: var(--accent); color: #000; font-weight: bold; transform: translateY(100px); transition: 0.5s; z-index: 99999; }

        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; resize: none; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><i class="fa fa-bolt"></i> <b>FLUXO OS</b> v7.0</div>
        <div id="os-clock">00:00:00</div>
        <div>
            <i class="fa fa-wifi"></i> 100% 
            <i class="fa fa-battery-full" style="margin-left:10px"></i>
        </div>
    </div>

    <div id="auth-screen" style="position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: flex; align-items: center; justify-content: center;">
        <div class="glass" style="width: 380px; padding: 40px; text-align: center;">
            <h1 style="color: var(--accent); letter-spacing: 5px;">FLUXO</h1>
            <input type="email" id="userEmail" placeholder="Teu E-mail">
            <div id="firstTimeFields" class="hidden">
                <input type="text" id="username" placeholder="Teu Nome">
            </div>
            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="handleAuth()">LOGIN</button>
        </div>
    </div>

    <div id="app" class="main-app hidden">
        <nav class="sidebar glass">
            <div class="nav-item active" onclick="switchTab('feed', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="switchTab('gallery', this)"><i class="fa-solid fa-images"></i></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><i class="fa-solid fa-gear"></i></div>
            <div class="nav-item" onclick="location.reload()" style="margin-top:auto"><i class="fa-solid fa-power-off"></i></div>
        </nav>

        <main class="content-scroll">
            <section id="tab-feed">
                <div class="glass" style="padding: 20px; margin-bottom: 30px;">
                    <textarea id="postTxt" rows="2" placeholder="O que estás a processar?"></textarea>
                    <div style="display:flex; justify-content: space-between;">
                        <label style="cursor:pointer; color:var(--accent); font-size:13px"><i class="fa fa-camera"></i> Foto <input type="file" id="postImgInput" class="hidden" accept="image/*"></label>
                        <button class="btn" onclick="publishPost()">ENVIAR POST</button>
                    </div>
                </div>
                <div id="feedArea"></div>
            </section>

            <section id="tab-gallery" class="hidden">
                <h2>Media Vault</h2>
                <p style="opacity:0.6; font-size:13px">Todas as imagens que publicaste na rede.</p>
                <div id="galleryArea" class="gallery-grid"></div>
            </section>

            <section id="tab-settings" class="hidden">
                <h2>Definições do Sistema</h2>
                <div class="glass" style="padding: 20px;">
                    <label>Nome Visual:</label>
                    <input type="text" id="editUsername">
                    <button class="btn" onclick="updateProfile()" style="width:100%">GUARDAR</button>
                </div>
            </section>
        </main>

        <aside>
            <div class="glass" style="padding: 25px; text-align: center;">
                <img id="myAvatarSide" class="avatar-circle" style="width: 90px; height: 90px; margin-bottom: 15px;">
                <h3 id="myNameSide" style="margin: 0;"></h3>
                <small id="myEmailSide" style="opacity:0.5"></small>
                
                <div style="margin-top: 30px; text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; font-size: 12px;">
                    <b style="color:var(--accent)">SISTEMA</b>
                    <p style="margin:5px 0">Uptime: <span id="uptime">0m</span></p>
                    <p style="margin:5px 0">Cache: <span id="cacheSize">0kb</span></p>
                </div>
            </div>
        </aside>
    </div>

    <div id="toaster">Mensagem do Sistema</div>

    <script>
        let currentUser = null;
        let posts = JSON.parse(localStorage.getItem('fluxo_v7_posts')) || [];
        let startTime = Date.now();

        // Relógio do Sistema
        setInterval(() => {
            document.getElementById('os-clock').innerText = new Date().toLocaleTimeString();
            let mins = Math.floor((Date.now() - startTime) / 60000);
            document.getElementById('uptime').innerText = mins + "m";
        }, 1000);

        function toast(msg) {
            const t = document.getElementById('toaster');
            t.innerText = msg;
            t.style.transform = "translateY(0)";
            setTimeout(() => t.style.transform = "translateY(100px)", 3000);
        }

        function handleAuth() {
            const email = document.getElementById('userEmail').value.trim().toLowerCase();
            if(!email) return;
            const stored = JSON.parse(localStorage.getItem('user_' + email));
            if(stored) login(stored);
            else {
                const f = document.getElementById('firstTimeFields');
                if(f.classList.contains('hidden')) f.classList.remove('hidden');
                else {
                    const u = { email, nome: document.getElementById('username').value, foto: "https://ui-avatars.com/api/?name="+email+"&background=00d2ff&color=000" };
                    localStorage.setItem('user_' + email, JSON.stringify(u));
                    login(u);
                }
            }
        }

        function login(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            updateUI();
            renderPosts();
            toast("Bem-vindo, " + user.nome);
        }

        function updateUI() {
            document.getElementById('myNameSide').innerText = currentUser.nome;
            document.getElementById('myEmailSide').innerText = currentUser.email;
            document.getElementById('myAvatarSide').src = currentUser.foto;
            document.getElementById('editUsername').value = currentUser.nome;
            document.getElementById('cacheSize').innerText = (JSON.stringify(localStorage).length / 1024).toFixed(2) + "kb";
        }

        function switchTab(tab, el) {
            ['feed', 'gallery', 'settings'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
            document.getElementById('tab-'+tab).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'gallery') renderGallery();
        }

        function publishPost() {
            const txt = document.getElementById('postTxt').value;
            const imgFile = document.getElementById('postImgInput').files[0];
            if(!txt && !imgFile) return;

            const save = (idat = null) => {
                posts.unshift({ u: currentUser.nome, f: currentUser.foto, t: txt, i: idat, e: currentUser.email });
                localStorage.setItem('fluxo_v7_posts', JSON.stringify(posts));
                document.getElementById('postTxt').value = "";
                renderPosts();
                toast("Publicado com sucesso!");
            };

            if(imgFile) {
                const r = new FileReader(); r.onload = () => save(r.result); r.readAsDataURL(imgFile);
            } else save();
        }

        function renderPosts() {
            document.getElementById('feedArea').innerHTML = posts.map(p => `
                <div class="glass post">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.f}" class="avatar-circle">
                        <b>${p.u}</b>
                    </div>
                    <p style="margin-top:10px">${p.t}</p>
                    ${p.i ? `<img src="${p.i}" class="post-img">` : ''}
                </div>
            `).join('');
        }

        function renderGallery() {
            const myImages = posts.filter(p => p.e === currentUser.email && p.i);
            document.getElementById('galleryArea').innerHTML = myImages.map(p => `
                <img src="${p.i}" class="gallery-item">
            `).join('');
        }

        function updateProfile() {
            currentUser.nome = document.getElementById('editUsername').value;
            localStorage.setItem('user_' + currentUser.email, JSON.stringify(currentUser));
            updateUI();
            toast("Perfil Atualizado!");
        }
    </script>
</body>
</html>
